name: Daily Mission Spotify Playlist

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore playlist state cache
        uses: actions/cache/restore@v4
        with:
          path: .cache/daily_mission_state.json
          key: daily-mission-state-${{ github.run_id }}
          restore-keys: |
            daily-mission-state-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run playlist sync
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          SPOTIFY_REDIRECT_URI: ${{ secrets.SPOTIFY_REDIRECT_URI }}
          MISSION_URL: https://bcd-api.fly.dev/api/missions/daily-mission
          PLAYLIST_TIMEZONE: Asia/Kolkata
          BCD_BEARER_TOKEN: ${{ secrets.BCD_BEARER_TOKEN }}
        run: python -m src.app --diagnostics

      - name: Save playlist state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache/daily_mission_state.json
          key: daily-mission-state-${{ github.run_id }}
